<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Unisci Video (online)</title>
  <style>
:root {
  --bg: #f3f4f6;
  --card-bg: #ffffff;
  --primary: #7c3aed;
  --primary-dark: #6d28d9;
  --text: #1f2937;
  --muted: #6b7280;
  --border: #d1d5db;
  --danger: #dc2626;
  --success: #16a34a;
  --item-bg: #fafafa;
  --hover-bg: #f5f3ff;
  --control-bg: #e5e7eb;
  --control-hover: #d1d5db;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111827;
    --card-bg: #1f2937;
    --text: #f9fafb;
    --muted: #9ca3af;
    --border: #4b5563;
    --danger: #f87171;
    --success: #4ade80;
    --item-bg: #111827;
    --hover-bg: #312e81;
    --control-bg: #374151;
    --control-hover: #4b5563;
  }
  .card { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); }
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

.card {
  background: var(--card-bg);
  width: 100%;
  max-width: 560px;
  padding: 32px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
}

h1 { margin: 0 0 4px; font-size: 1.6rem; }

.subtitle {
  margin: 0 0 24px;
  color: var(--muted);
  font-size: 0.95rem;
}

.dropzone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 32px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.15s, background 0.15s;
}

.dropzone:hover,
.dropzone.dragover {
  border-color: var(--primary);
  background: var(--hover-bg);
}

.dropzone-icon { font-size: 2rem; }
.dropzone-text { color: var(--muted); }

.file-list { list-style: none; margin: 20px 0 0; padding: 0; }

.file-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  background: var(--item-bg);
  cursor: grab;
}

.file-item.dragging { opacity: 0.45; }
.file-item.drop-target { border-color: var(--primary); }

.file-index {
  flex: 0 0 auto;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

.file-thumb {
  flex: 0 0 auto;
  width: 56px;
  height: 34px;
  border-radius: 6px;
  background: var(--control-bg);
  object-fit: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  overflow: hidden;
}

.file-info {
  flex: 1 1 auto;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.file-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 0.92rem;
}

.file-meta { color: var(--muted); font-size: 0.78rem; }

.icon-btn {
  flex: 0 0 auto;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 1rem;
  padding: 4px 6px;
  border-radius: 6px;
  color: var(--muted);
}

.icon-btn:hover:not(:disabled) { background: var(--control-bg); color: var(--text); }
.icon-btn:disabled { opacity: 0.3; cursor: default; }

.summary {
  margin: 10px 0 0;
  font-size: 0.82rem;
  color: var(--muted);
  text-align: center;
}

.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 18px;
}

.progress-track {
  flex: 1 1 auto;
  height: 8px;
  background: var(--control-bg);
  border-radius: 999px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: var(--primary);
  transition: width 0.2s ease;
}

.progress-label {
  flex: 0 0 auto;
  min-width: 3em;
  text-align: right;
  font-size: 0.82rem;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

.actions { display: flex; gap: 12px; margin-top: 24px; }

.btn {
  flex: 1;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
}

.btn:disabled { opacity: 0.5; cursor: default; }

.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-dark); }

.btn-secondary { background: var(--control-bg); color: var(--text); }
.btn-secondary:hover:not(:disabled) { background: var(--control-hover); }

.status {
  margin: 16px 0 0;
  min-height: 1.2em;
  font-size: 0.9rem;
  text-align: center;
}

.status.error { color: var(--danger); }
.status.success { color: var(--success); }
.status.busy { color: var(--muted); }

.hint {
  margin: 12px 0 0;
  font-size: 0.8rem;
  color: var(--muted);
  text-align: center;
}

.cover-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 16px;
  padding: 12px;
  border: 1px dashed var(--border);
  border-radius: 10px;
}

.btn-cover {
  flex: 0 0 auto;
  padding: 8px 14px;
  font-size: 0.88rem;
}

.cover-name {
  flex: 1 1 auto;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 0.85rem;
  color: var(--muted);
}

.dur-label {
  flex: 0 0 auto;
  margin-left: auto;
  font-size: 0.85rem;
  color: var(--text);
}

.dur-label input {
  width: 56px;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.9rem;
  background: var(--card-bg);
  color: var(--text);
}

.preview { margin-top: 20px; }

.preview video {
  display: block;
  width: 100%;
  max-height: 320px;
  border-radius: 12px;
  background: #000;
}

.preview-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
}

.preview-row input {
  flex: 1 1 auto;
  min-width: 0;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 0.95rem;
  background: var(--card-bg);
  color: var(--text);
}

.out-ext { flex: 0 0 auto; color: var(--muted); }

.preview .actions { margin-top: 12px; }

  </style>
  <!-- ffmpeg.wasm (single-thread core: nessun header speciale richiesto) -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
  <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
</head>
<body>
  <main class="card">
    <h1>🎬 Unisci Video</h1>
    <p class="subtitle">Seleziona 2 o più video, mettili nell'ordine desiderato e uniscili in un unico file MP4 — tutto nel tuo browser.</p>

    <label for="file-input" class="dropzone" id="dropzone">
      <span class="dropzone-icon">⬆️</span>
      <span class="dropzone-text">Clicca per scegliere i video<br /><small>oppure trascinali qui</small></span>
      <input type="file" id="file-input" accept="video/*" multiple hidden />
    </label>

    <ul id="file-list" class="file-list" aria-live="polite"></ul>
    <p id="summary" class="summary" hidden></p>

    <div class="cover-row">
      <input type="file" id="cover-input" accept="image/*" hidden />
      <button type="button" id="cover-btn" class="btn btn-secondary btn-cover">🖼️ Aggiungi copertina</button>
      <span id="cover-name" class="cover-name"></span>
      <button type="button" id="cover-remove" class="icon-btn" title="Rimuovi copertina" hidden>✕</button>
      <label class="dur-label">Durata <input type="number" id="cover-dur" value="3" min="1" max="60" step="1" /> s</label>
    </div>

    <div class="progress-row" id="progress-wrap" hidden>
      <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
      <span id="progress-label" class="progress-label"></span>
    </div>

    <div class="actions">
      <button type="button" id="clear-btn" class="btn btn-secondary" disabled>Svuota</button>
      <button type="button" id="merge-btn" class="btn btn-primary" disabled>Unisci</button>
    </div>

    <div id="preview" class="preview" hidden>
      <video id="preview-video" controls playsinline></video>
      <div class="preview-row">
        <input type="text" id="out-name" value="video-unito" aria-label="Nome del file" />
        <span class="out-ext">.mp4</span>
      </div>
      <div class="actions">
        <button type="button" id="discard-btn" class="btn btn-secondary">✕ Scarta</button>
        <button type="button" id="save-btn" class="btn btn-primary">💾 Salva</button>
      </div>
    </div>

    <p id="status" class="status" role="status"></p>
    <p class="hint">🔒 I video restano sul tuo dispositivo: nulla viene caricato online. Adatta a video piccoli/brevi.</p>
  </main>

  <script>
"use strict";

// ---------------------------------------------------------------------------
// "Unisci Video" — versione 100% browser, basata su ffmpeg.wasm.
// Nessun server: i video vengono elaborati localmente nel browser.
// ---------------------------------------------------------------------------

const { FFmpeg } = FFmpegWASM;
const { fetchFile, toBlobURL } = FFmpegUtil;

// Single-thread core: non richiede header COOP/COEP, quindi funziona su
// GitHub Pages senza configurazioni particolari.
const FFMPEG_BASE = "https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd";
// Il worker di ffmpeg è un "module worker" e carica il core via import(): serve
// quindi la build ESM del core (quella UMD non espone `export default`).
const CORE_BASE = "https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm";
// Worker chunk di @ffmpeg/ffmpeg@0.12.10. Deve essere un URL assoluto.
const WORKER_URL = `${FFMPEG_BASE}/814.ffmpeg.js`;

const VIDEO_EXT = /\.(mp4|mov|m4v|avi|mkv|webm|wmv|flv|mpe?g|3gp)$/i;

let items = [];         // { file, thumb, duration } in merge order
let cover = null;       // optional cover image File shown at the start
let ffmpeg = null;      // lazily created FFmpeg instance
let logBuffer = [];     // captured ffmpeg log lines for the current command
let progressActive = false; // only track ffmpeg progress during the real merge
let resultBlob = null;  // finished video waiting in the preview
let resultUrl = null;   // object URL backing the preview player
let dragIndex = null;   // index being dragged for list reordering

const fileInput = document.getElementById("file-input");
const dropzone = document.getElementById("dropzone");
const fileListEl = document.getElementById("file-list");
const summaryEl = document.getElementById("summary");
const mergeBtn = document.getElementById("merge-btn");
const clearBtn = document.getElementById("clear-btn");
const statusEl = document.getElementById("status");
const progressWrap = document.getElementById("progress-wrap");
const progressBar = document.getElementById("progress-bar");
const progressLabel = document.getElementById("progress-label");
const coverInput = document.getElementById("cover-input");
const coverBtn = document.getElementById("cover-btn");
const coverNameEl = document.getElementById("cover-name");
const coverRemoveBtn = document.getElementById("cover-remove");
const coverDurInput = document.getElementById("cover-dur");
const previewEl = document.getElementById("preview");
const previewVideo = document.getElementById("preview-video");
const outNameInput = document.getElementById("out-name");
const saveBtn = document.getElementById("save-btn");
const discardBtn = document.getElementById("discard-btn");

// --- Helpers ---------------------------------------------------------------

function formatSize(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(0)} KB`;
  if (bytes < 1024 * 1024 * 1024) return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
  return `${(bytes / (1024 * 1024 * 1024)).toFixed(2)} GB`;
}

function formatDuration(seconds) {
  if (!isFinite(seconds) || seconds <= 0) return "";
  const s = Math.round(seconds);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
  return `${m}:${String(sec).padStart(2, "0")}`;
}

function setStatus(message, kind) {
  statusEl.textContent = message || "";
  statusEl.className = "status" + (kind ? " " + kind : "");
}

function setProgress(fraction) {
  if (fraction == null) {
    progressWrap.hidden = true;
    progressBar.style.width = "0%";
    progressLabel.textContent = "";
    return;
  }
  progressWrap.hidden = false;
  const pct = Math.max(0, Math.min(100, Math.round(fraction * 100)));
  progressBar.style.width = pct + "%";
  progressLabel.textContent = pct + "%";
}

function isVideo(file) {
  return (file.type && file.type.startsWith("video/")) || VIDEO_EXT.test(file.name);
}

function extOf(name) {
  const m = /\.([a-z0-9]+)$/i.exec(name);
  return m ? m[1].toLowerCase() : "mp4";
}

function even(n) {
  return n % 2 === 0 ? n : n + 1;
}

function sanitizeName(name) {
  const cleaned = (name || "").replace(/[\\/:*?"<>|]/g, "").trim().replace(/\.mp4$/i, "");
  return cleaned || "video-unito";
}

// --- File list management --------------------------------------------------

function addFiles(fileListLike) {
  const incoming = Array.from(fileListLike);
  let skipped = 0;
  for (const file of incoming) {
    if (!isVideo(file)) { skipped++; continue; }
    const duplicate = items.some((it) => it.file.name === file.name && it.file.size === file.size);
    if (duplicate) continue;
    const item = { file, thumb: null, duration: null };
    items.push(item);
    loadMeta(item);
  }
  render();
  setStatus(skipped > 0 ? `${skipped} file ignorato/i perché non è un video.` : "", skipped > 0 ? "error" : "");
}

// Read duration and grab a small thumbnail frame using an off-DOM <video>.
// Best-effort: codecs the browser can't decode simply keep the placeholder.
function loadMeta(item) {
  const url = URL.createObjectURL(item.file);
  const video = document.createElement("video");
  video.preload = "metadata";
  video.muted = true;
  video.playsInline = true;
  let finished = false;
  const done = () => {
    if (finished) return;
    finished = true;
    URL.revokeObjectURL(url);
    video.removeAttribute("src");
    try { video.load(); } catch (_) {}
    render();
  };
  video.addEventListener("loadedmetadata", () => {
    if (isFinite(video.duration)) item.duration = video.duration;
    try {
      video.currentTime = Math.min(1, (video.duration || 0) / 2);
    } catch (_) { done(); }
  });
  video.addEventListener("seeked", () => {
    try {
      const w = 112;
      const ratio = video.videoWidth ? video.videoHeight / video.videoWidth : 9 / 16;
      const h = Math.max(2, Math.round(w * ratio));
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(video, 0, 0, w, h);
      item.thumb = canvas.toDataURL("image/jpeg", 0.7);
    } catch (_) {}
    done();
  });
  video.addEventListener("error", done);
  video.src = url;
}

function removeAt(index) { items.splice(index, 1); render(); }

function move(index, delta) {
  const target = index + delta;
  if (target < 0 || target >= items.length) return;
  [items[index], items[target]] = [items[target], items[index]];
  render();
}

function render() {
  fileListEl.innerHTML = "";
  items.forEach((item, i) => {
    const li = document.createElement("li");
    li.className = "file-item";
    li.draggable = true;
    li.innerHTML = `
      <span class="file-index">${i + 1}</span>
      ${item.thumb
        ? `<img class="file-thumb" alt="" src="${item.thumb}" />`
        : `<span class="file-thumb">🎞️</span>`}
      <span class="file-info">
        <span class="file-name"></span>
        <span class="file-meta"></span>
      </span>
      <button class="icon-btn" data-act="up" ${i === 0 ? "disabled" : ""} title="Sposta su">▲</button>
      <button class="icon-btn" data-act="down" ${i === items.length - 1 ? "disabled" : ""} title="Sposta giù">▼</button>
      <button class="icon-btn" data-act="remove" title="Rimuovi">✕</button>
    `;
    const nameEl = li.querySelector(".file-name");
    nameEl.textContent = item.file.name;
    nameEl.title = item.file.name;
    const dur = formatDuration(item.duration);
    li.querySelector(".file-meta").textContent = formatSize(item.file.size) + (dur ? ` · ${dur}` : "");
    li.querySelector('[data-act="up"]').addEventListener("click", () => move(i, -1));
    li.querySelector('[data-act="down"]').addEventListener("click", () => move(i, 1));
    li.querySelector('[data-act="remove"]').addEventListener("click", () => removeAt(i));

    // Drag & drop reordering (in addition to the arrows).
    li.addEventListener("dragstart", (e) => {
      dragIndex = i;
      li.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      try { e.dataTransfer.setData("text/plain", String(i)); } catch (_) {}
    });
    li.addEventListener("dragend", () => { dragIndex = null; render(); });
    li.addEventListener("dragover", (e) => {
      if (dragIndex === null) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      if (dragIndex !== i) li.classList.add("drop-target");
    });
    li.addEventListener("dragleave", () => li.classList.remove("drop-target"));
    li.addEventListener("drop", (e) => {
      if (dragIndex === null) return;
      e.preventDefault();
      if (dragIndex !== i) {
        const [moved] = items.splice(dragIndex, 1);
        items.splice(i, 0, moved);
      }
      dragIndex = null;
      render();
    });

    fileListEl.appendChild(li);
  });

  updateSummary();
  mergeBtn.disabled = items.length < 2;
  clearBtn.disabled = items.length === 0;
}

function updateSummary() {
  if (items.length === 0) {
    summaryEl.hidden = true;
    summaryEl.textContent = "";
    return;
  }
  const totalBytes = items.reduce((s, it) => s + it.file.size, 0);
  const known = items.filter((it) => isFinite(it.duration) && it.duration > 0);
  const totalDur = known.reduce((s, it) => s + it.duration, 0);
  let text = `${items.length} video · ${formatSize(totalBytes)}`;
  if (known.length > 0) {
    text += ` · ${formatDuration(totalDur)}${known.length < items.length ? "+" : ""} totali`;
  }
  summaryEl.textContent = text;
  summaryEl.hidden = false;
}

// --- File picking: click + drag & drop ---------------------------------------

fileInput.addEventListener("change", (e) => {
  addFiles(e.target.files);
  fileInput.value = "";
});

["dragenter", "dragover"].forEach((evt) =>
  dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.add("dragover"); })
);
["dragleave", "drop"].forEach((evt) =>
  dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.remove("dragover"); })
);
dropzone.addEventListener("drop", (e) => {
  if (e.dataTransfer && e.dataTransfer.files) addFiles(e.dataTransfer.files);
});

clearBtn.addEventListener("click", () => { items = []; render(); setStatus(""); });

// --- Cover image (optional intro) ------------------------------------------

coverBtn.addEventListener("click", () => coverInput.click());

coverInput.addEventListener("change", (e) => {
  const file = e.target.files && e.target.files[0];
  coverInput.value = "";
  if (!file) return;
  const isImage =
    (file.type && file.type.startsWith("image/")) ||
    /\.(jpe?g|png|webp|bmp|gif)$/i.test(file.name);
  if (!isImage) {
    setStatus("La copertina deve essere un'immagine (JPG, PNG…).", "error");
    return;
  }
  cover = file;
  renderCover();
  setStatus("");
});

coverRemoveBtn.addEventListener("click", () => { cover = null; renderCover(); });

function renderCover() {
  if (cover) {
    coverNameEl.textContent = cover.name;
    coverRemoveBtn.hidden = false;
    coverBtn.textContent = "🖼️ Cambia copertina";
  } else {
    coverNameEl.textContent = "";
    coverRemoveBtn.hidden = true;
    coverBtn.textContent = "🖼️ Aggiungi copertina";
  }
}

// Read the chosen cover duration (seconds), clamped to a sensible range.
function coverDuration() {
  let d = parseFloat(coverDurInput.value);
  if (!isFinite(d) || d <= 0) d = 3;
  return Math.max(1, Math.min(60, d));
}

// --- FFmpeg (loaded lazily on first use) -----------------------------------

async function ensureFFmpeg() {
  if (ffmpeg) return ffmpeg;
  setStatus("Preparazione del motore video… (primo avvio: scarica ~30 MB)", "busy");
  const instance = new FFmpeg();
  instance.on("log", ({ message }) => { logBuffer.push(message); });
  // Registered once here (not per merge) so listeners don't pile up. The
  // probe execs also emit progress events, hence the progressActive gate.
  instance.on("progress", ({ progress }) => {
    if (progressActive && progress >= 0 && progress <= 1) setProgress(progress);
  });
  // Tutto caricato come blob di pari-origine: da CDN un Worker cross-origin
  // verrebbe bloccato, mentre un worker-blob può importare il core-blob (ESM).
  await instance.load({
    classWorkerURL: await toBlobURL(WORKER_URL, "text/javascript"),
    coreURL: await toBlobURL(`${CORE_BASE}/ffmpeg-core.js`, "text/javascript"),
    wasmURL: await toBlobURL(`${CORE_BASE}/ffmpeg-core.wasm`, "application/wasm"),
  });
  ffmpeg = instance;
  return ffmpeg;
}

// Run ffmpeg with no output just to read the stream info it prints to the log.
async function probe(name) {
  logBuffer = [];
  try { await ffmpeg.exec(["-i", name]); } catch (_) { /* expected: no output file */ }
  const text = logBuffer.join("\n");

  const vLine = text.split("\n").find((l) => l.includes("Video:")) || "";
  const size = /(\d{2,5})x(\d{2,5})/.exec(vLine);
  if (!size) throw new Error(`Impossibile leggere il video "${name}".`);

  const fpsM = /([\d.]+)\s*fps/.exec(vLine);
  const codecM = /Video:\s*([a-zA-Z0-9_]+)/.exec(vLine);
  const durM = /Duration:\s*(\d+):(\d+):(\d+\.\d+)/.exec(text);
  const duration = durM
    ? (+durM[1]) * 3600 + (+durM[2]) * 60 + parseFloat(durM[3])
    : 0;

  return {
    width: parseInt(size[1], 10),
    height: parseInt(size[2], 10),
    fps: fpsM ? parseFloat(fpsM[1]) : 30,
    vcodec: codecM ? codecM[1] : "unknown",
    duration,
    hasAudio: text.includes("Audio:"),
  };
}

async function fileExists(name) {
  try {
    const data = await ffmpeg.readFile(name);
    return data && data.length > 0;
  } catch (_) {
    return false;
  }
}

// Fast, lossless: works only when all inputs share codec/resolution/fps/audio.
async function tryFastConcat(infos, names, out) {
  const first = infos[0];
  const uniform = infos.every((i) =>
    i.width === first.width && i.height === first.height &&
    i.vcodec === first.vcodec && i.hasAudio === first.hasAudio &&
    Math.abs(i.fps - first.fps) < 0.01
  );
  if (!uniform) return false;

  const list = names.map((n) => `file '${n}'`).join("\n");
  await ffmpeg.writeFile("list.txt", new TextEncoder().encode(list));
  try {
    await ffmpeg.exec(["-y", "-f", "concat", "-safe", "0", "-i", "list.txt",
      "-c", "copy", "-movflags", "+faststart", out]);
  } catch (_) { return false; }
  return fileExists(out);
}

// Robust: normalise every clip to a common canvas and re-encode.
// `cover` (optional) = { name, duration }: a still image shown at the start.
async function reencodeConcat(infos, names, out, cover) {
  const canvasW = even(Math.max(...infos.map((i) => i.width)));
  const canvasH = even(Math.max(...infos.map((i) => i.height)));
  const fps = Math.round(Math.max(...infos.map((i) => i.fps))) || 30;

  const args = ["-y"];
  // Build the ordered list of segments (cover first, if any), each tracking
  // the ffmpeg input index that provides its video.
  const segments = [];
  let inputIndex = 0;

  if (cover) {
    // A looped still image, capped to the chosen duration.
    args.push("-loop", "1", "-t", cover.duration.toFixed(3), "-i", cover.name);
    segments.push({ vIndex: inputIndex++, hasAudio: false, duration: cover.duration });
  }
  names.forEach((n, k) => {
    args.push("-i", n);
    segments.push({ vIndex: inputIndex++, hasAudio: infos[k].hasAudio, duration: infos[k].duration });
  });

  // Add a finite silent-audio input for every segment without audio.
  segments.forEach((seg) => {
    if (seg.hasAudio) {
      seg.aIndex = seg.vIndex;
    } else {
      const dur = Math.max(seg.duration, 0.1).toFixed(3);
      args.push("-f", "lavfi", "-t", dur, "-i",
        "anullsrc=channel_layout=stereo:sample_rate=44100");
      seg.aIndex = inputIndex++;
    }
  });

  const filters = [];
  const pads = [];
  segments.forEach((seg, idx) => {
    filters.push(
      `[${seg.vIndex}:v]scale=${canvasW}:${canvasH}:force_original_aspect_ratio=decrease,` +
      `pad=${canvasW}:${canvasH}:-1:-1:color=black,setsar=1,fps=${fps},format=yuv420p[v${idx}]`
    );
    filters.push(`[${seg.aIndex}:a]aformat=sample_rates=44100:channel_layouts=stereo[a${idx}]`);
    pads.push(`[v${idx}][a${idx}]`);
  });

  const filterComplex =
    filters.join(";") + ";" + pads.join("") + `concat=n=${segments.length}:v=1:a=1[outv][outa]`;

  args.push(
    "-filter_complex", filterComplex,
    "-map", "[outv]", "-map", "[outa]",
    "-c:v", "libx264", "-preset", "veryfast", "-crf", "23",
    "-c:a", "aac", "-b:a", "192k",
    "-movflags", "+faststart", out
  );

  await ffmpeg.exec(args);
  if (!(await fileExists(out))) {
    throw new Error("FFmpeg non è riuscito a unire i video.");
  }
}

// --- Result preview + save ---------------------------------------------------

function showPreview(blob) {
  clearPreview();
  resultBlob = blob;
  resultUrl = URL.createObjectURL(blob);
  previewVideo.src = resultUrl;
  previewEl.hidden = false;
}

function clearPreview() {
  try { previewVideo.pause(); } catch (_) {}
  previewVideo.removeAttribute("src");
  try { previewVideo.load(); } catch (_) {}
  if (resultUrl) URL.revokeObjectURL(resultUrl);
  resultBlob = null;
  resultUrl = null;
  previewEl.hidden = true;
}

// Saving happens on a fresh click, so showSaveFilePicker always has the user
// activation it requires (a picker invoked after minutes of processing would
// be rejected by the browser and silently fall back to a plain download).
async function saveBlob(blob, filename) {
  if (typeof window.showSaveFilePicker === "function") {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: "Video MP4", accept: { "video/mp4": [".mp4"] } }],
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return "saved";
    } catch (err) {
      if (err && err.name === "AbortError") return "cancelled";
    }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  return "downloaded";
}

saveBtn.addEventListener("click", async () => {
  if (!resultBlob) return;
  const filename = sanitizeName(outNameInput.value) + ".mp4";
  const result = await saveBlob(resultBlob, filename);
  if (result === "cancelled") setStatus("Salvataggio annullato.", "");
  else if (result === "saved") setStatus("✓ Video salvato nella posizione scelta.", "success");
  else setStatus("✓ Video pronto: controlla la cartella Download.", "success");
});

discardBtn.addEventListener("click", () => { clearPreview(); setStatus(""); });

// --- Merge orchestration ---------------------------------------------------

async function cleanupFS(names, extra) {
  for (const n of [...names, ...extra]) {
    try { await ffmpeg.deleteFile(n); } catch (_) {}
  }
}

mergeBtn.addEventListener("click", async () => {
  if (items.length < 2) { setStatus("Seleziona almeno 2 file video.", "error"); return; }

  const totalBytes = items.reduce((s, it) => s + it.file.size, 0);
  if (totalBytes > 700 * 1024 * 1024) {
    setStatus("File troppo grandi per l'elaborazione nel browser (max ~700 MB in totale).", "error");
    return;
  }

  clearPreview();
  mergeBtn.disabled = true;
  clearBtn.disabled = true;
  const names = items.map((it, i) => `in${i}.${extOf(it.file.name)}`);
  let coverName = null;

  try {
    await ensureFFmpeg();

    setStatus("Caricamento dei file…", "busy");
    setProgress(0);
    for (let i = 0; i < items.length; i++) {
      await ffmpeg.writeFile(names[i], await fetchFile(items[i].file));
    }
    if (cover) {
      coverName = `cover.${extOf(cover.name)}`;
      await ffmpeg.writeFile(coverName, await fetchFile(cover));
    }

    setStatus("Analisi dei video…", "busy");
    const infos = [];
    for (const n of names) infos.push(await probe(n));

    setStatus("Unione in corso… può richiedere qualche minuto.", "busy");
    progressActive = true;
    if (coverName) {
      // With a cover we always re-encode (the image must be turned into video).
      await reencodeConcat(infos, names, "out.mp4", { name: coverName, duration: coverDuration() });
    } else {
      const fast = await tryFastConcat(infos, names, "out.mp4");
      if (!fast) await reencodeConcat(infos, names, "out.mp4", null);
    }
    progressActive = false;

    const data = await ffmpeg.readFile("out.mp4");
    const blob = new Blob([data.buffer], { type: "video/mp4" });

    setProgress(null);
    showPreview(blob);
    setStatus(`✓ Video pronto (${formatSize(blob.size)}): guarda l'anteprima e salva.`, "success");

    await cleanupFS(names, ["out.mp4", "list.txt", coverName].filter(Boolean));
  } catch (err) {
    progressActive = false;
    console.error(err);
    setProgress(null);
    setStatus("Errore durante l'unione: " + (err && err.message ? err.message : "riprova con video più piccoli."), "error");
  } finally {
    render();
  }
});

render();

  </script>
</body>
